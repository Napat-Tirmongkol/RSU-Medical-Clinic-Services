    <script>
        // ── Log this 404 to the backend ──────────────────────────────────────
        // The static error page can't talk to the DB directly, so we POST a
        // report to ajax_log_404.php which writes into sys_error_logs.
        (function () {
            try {
                var payload = JSON.stringify({
                    url:      window.location.href,
                    status:   404,
                    referrer: document.referrer || '',
                    message:  '404 (IIS error_docs): ' + window.location.pathname,
                    context: {
                        source: 'error_docs/not_found.html',
                        user_agent: navigator.userAgent,
                    },
                });
                var ENDPOINT = '/rsu-clinic/portal/ajax_log_404.php';
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(ENDPOINT, new Blob([payload], { type: 'application/json' }));
                } else {
                    fetch(ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: payload,
                        keepalive: true,
                    }).catch(function () { /* swallow */ });
                }
            } catch (_) { /* never break the error page because logging failed */ }
        })();
    </script>
