; ─── Upload / Memory limits ─────────────────────────────────────────────────
upload_max_filesize = 100M
post_max_size = 256M
memory_limit = 512M
max_file_uploads = 500
max_input_vars = 10000
max_execution_time = 300

; ─── Error display (production hardening, Patch Set 5) ──────────────────────
; Never render stack traces / file paths / SQL to browsers. Errors go to logs.
display_errors = Off
display_startup_errors = Off
log_errors = On
; Remove "X-Powered-By: PHP/x.y.z" header (defense-in-depth vs. version fingerprint).
expose_php = Off

; ─── Session hardening (Phase 7 audit High items) ───────────────────────────
; Reject session IDs not generated by PHP (closes session fixation).
session.use_strict_mode = 1
; Never accept session IDs from URL query strings — cookie only.
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
